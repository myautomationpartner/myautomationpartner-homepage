<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1000" height="1000" fill="#000000" rx="60"/>

  <!-- Head Silhouette -->
  <path d="M 350 200 Q 300 200 300 280 L 300 480 Q 300 560 360 600 Q 380 610 420 610 L 420 650 Q 280 650 240 520 Q 200 400 200 300 Q 200 180 300 140 Q 400 100 500 100 Q 600 100 700 140 Q 800 180 800 300 Q 800 400 760 520 Q 720 650 580 650 L 580 610 Q 620 610 640 600 Q 700 560 700 480 L 700 280 Q 700 200 650 200 Z" fill="none" stroke="#D4AF37" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Head detail lines -->
  <path d="M 400 300 Q 450 280 500 280 Q 550 280 600 300" fill="none" stroke="#D4AF37" stroke-width="15" stroke-linecap="round"/>

  <!-- Chin line -->
  <path d="M 350 550 Q 500 600 650 550" fill="none" stroke="#D4AF37" stroke-width="15" stroke-linecap="round"/>

  <!-- AI Chip/CPU Icon in head -->
  <g transform="translate(500, 350)">
    <!-- Outer chip frame -->
    <rect x="-100" y="-100" width="200" height="200" fill="none" stroke="#D4AF37" stroke-width="15" rx="20"/>

    <!-- Inner square -->
    <rect x="-70" y="-70" width="140" height="140" fill="none" stroke="#D4AF37" stroke-width="12" rx="10"/>

    <!-- Chip pins/contacts -->
    <!-- Top pins -->
    <line x1="-50" y1="-100" x2="-50" y2="-130" stroke="#D4AF37" stroke-width="12" stroke-linecap="round"/>
    <line x1="-20" y1="-100" x2="-20" y2="-130" stroke="#D4AF37" stroke-width="12" stroke-linecap="round"/>
    <line x1="10" y1="-100" x2="10" y2="-130" stroke="#D4AF37" stroke-width="12" stroke-linecap="round"/>
    <line x1="50" y1="-100" x2="50" y2="-130" stroke="#D4AF37" stroke-width="12" stroke-linecap="round"/>

    <!-- Right pins -->
    <line x1="100" y1="-50" x2="130" y2="-50" stroke="#D4AF37" stroke-width="12" stroke-linecap="round"/>
    <line x1="100" y1="-20" x2="130" y2="-20" stroke="#D4AF37" stroke-width="12" stroke-linecap="round"/>
    <line x1="100" y1="10" x2="130" y2="10" stroke="#D4AF37" stroke-width="12" stroke-linecap="round"/>
    <line x1="100" y1="50" x2="130" y2="50" stroke="#D4AF37" stroke-width="12" stroke-linecap="round"/>

    <!-- Bottom pins -->
    <line x1="50" y1="100" x2="50" y2="130" stroke="#D4AF37" stroke-width="12" stroke-linecap="round"/>
    <line x1="10" y1="100" x2="10" y2="130" stroke="#D4AF37" stroke-width="12" stroke-linecap="round"/>
    <line x1="-20" y1="100" x2="-20" y2="130" stroke="#D4AF37" stroke-width="12" stroke-linecap="round"/>
    <line x1="-50" y1="100" x2="-50" y2="130" stroke="#D4AF37" stroke-width="12" stroke-linecap="round"/>

    <!-- Left pins -->
    <line x1="-100" y1="50" x2="-130" y2="50" stroke="#D4AF37" stroke-width="12" stroke-linecap="round"/>
    <line x1="-100" y1="10" x2="-130" y2="10" stroke="#D4AF37" stroke-width="12" stroke-linecap="round"/>
    <line x1="-100" y1="-20" x2="-130" y2="-20" stroke="#D4AF37" stroke-width="12" stroke-linecap="round"/>
    <line x1="-100" y1="-50" x2="-130" y2="-50" stroke="#D4AF37" stroke-width="12" stroke-linecap="round"/>

    <!-- Center dot -->
    <circle cx="0" cy="0" r="20" fill="#D4AF37"/>
  </g>

  <!-- Text: MY AUTOMATION PARTNER -->
  <text x="500" y="800" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="#D4AF37" text-anchor="middle" letter-spacing="3">MY AUTOMATION</text>
  <text x="500" y="900" font-family="Arial, sans-serif" font-size="90" font-weight="bold" fill="#D4AF37" text-anchor="middle" letter-spacing="2">PARTNER</text>

  <!-- Decorative line -->
  <line x1="200" y1="950" x2="800" y2="950" stroke="#D4AF37" stroke-width="20" stroke-linecap="round"/>
</svg>